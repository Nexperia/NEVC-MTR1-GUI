name: Release

# Trigger only on version tags (e.g. v1.0.0, v0.3.1-beta)
on:
  push:
    tags:
      - "v*"

env:
  BINARY_NAME: NEVC-MTR1-GUI

jobs:
  build-windows-x64:
    name: Build - Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-x64-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $archive = "${{ env.BINARY_NAME }}-${version}-windows-x64.zip"
          Copy-Item "target\x86_64-pc-windows-msvc\release\${{ env.BINARY_NAME }}.exe" -Destination .
          $files = @("${{ env.BINARY_NAME }}.exe", "SAFETY.md", "README.md", "LICENSE")
          $existing = $files | Where-Object { Test-Path $_ }
          Compress-Archive -Path $existing -DestinationPath $archive -Force
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ env.ARCHIVE }}

  build-windows-arm64:
    name: Build - Windows ARM64
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-arm64-cargo-

      - name: Build release binary
        run: cargo build --release --target aarch64-pc-windows-msvc

      - name: Package release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $archive = "${{ env.BINARY_NAME }}-${version}-windows-arm64.zip"
          Copy-Item "target\aarch64-pc-windows-msvc\release\${{ env.BINARY_NAME }}.exe" -Destination .
          $files = @("${{ env.BINARY_NAME }}.exe", "SAFETY.md", "README.md", "LICENSE")
          $existing = $files | Where-Object { Test-Path $_ }
          Compress-Archive -Path $existing -DestinationPath $archive -Force
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: ${{ env.ARCHIVE }}

  build-linux-x64:
    name: Build - Linux x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libudev-dev \
            libxkbcommon-dev libwayland-dev \
            libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libgtk-3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x64-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package release archive
        run: |
          version="${{ github.ref_name }}"
          archive="${{ env.BINARY_NAME }}-${version}-linux-x64.tar.gz"
          cp "target/x86_64-unknown-linux-gnu/release/${{ env.BINARY_NAME }}" .
          files=()
          for f in "${{ env.BINARY_NAME }}" SAFETY.md README.md LICENSE; do
            [ -f "$f" ] && files+=("$f")
          done
          tar -czf "$archive" "${files[@]}"
          echo "ARCHIVE=$archive" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ${{ env.ARCHIVE }}

  build-macos-arm64:
    name: Build - macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-arm64-cargo-

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package release archive
        run: |
          version="${{ github.ref_name }}"
          archive="${{ env.BINARY_NAME }}-${version}-macos-arm64.tar.gz"
          cp "target/aarch64-apple-darwin/release/${{ env.BINARY_NAME }}" .
          files=()
          for f in "${{ env.BINARY_NAME }}" SAFETY.md README.md LICENSE; do
            [ -f "$f" ] && files+=("$f")
          done
          tar -czf "$archive" "${files[@]}"
          echo "ARCHIVE=$archive" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ${{ env.ARCHIVE }}

  release:
    name: Create GitHub Release
    needs: [build-windows-x64, build-windows-arm64, build-linux-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NEVC-MTR1 GUI ${{ github.ref_name }}"
          body: |
            ## NEVC-MTR1 Motor Evaluation Kit GUI ${{ github.ref_name }}

            > **⚠ PREVIEW SOFTWARE - Read [SAFETY.md](SAFETY.md) before use.**

            ### Installation
            1. Download the archive for your platform below and extract it.
            2. Run `NEVC-MTR1-GUI.exe` (Windows) or `NEVC-MTR1-GUI` (Linux/macOS) - no installer required.
            3. Connect your NEVC-MTR1 board via USB before launching.

            | Platform | File | Status |
            |----------|------|--------|
            | Windows x64 | `NEVC-MTR1-GUI-*-windows-x64.zip` | Tested |
            | Windows ARM64 | `NEVC-MTR1-GUI-*-windows-arm64.zip` | **Untested** |
            | Linux x64 | `NEVC-MTR1-GUI-*-linux-x64.tar.gz` | **Untested** |
            | macOS Apple Silicon | `NEVC-MTR1-GUI-*-macos-arm64.tar.gz` | **Untested** |

            > **Windows ARM64 / Linux / macOS:** These builds compile but have not been tested on real hardware. Use at your own risk and please report any issues.
            >
            > **macOS note:** The binary is not code-signed. On first launch, right-click the binary and choose **Open** to bypass Gatekeeper.
            >
            > **Linux/macOS note:** The firmware compile/upload tab requires `arduino-cli` to be installed manually - automatic download is Windows-only for now.

            ### Safety
            This software is in **preview**. There may be bugs that could cause
            unexpected motor behaviour. Always read **SAFETY.md** and ensure the
            motor is securely clamped before operation.
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
